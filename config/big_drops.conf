# Big drops: high pressure, large flat-fan orifice, narrow cone.
# Large lognormal-distributed droplets that fly further from the axis.

# --- Material (sprayed liquid) ---
MATERIAL=water
DENSITY=
VISCOSITY=
SOLIDS_FRACTION=1.0

# --- Hydraulics ---
PRESSURE_BAR=5.0
ORIFICE_MM=1.2
NOZZLE_SHAPE=flat_fan
SPRAY_DURATION=0.1

# --- Droplet size distribution ---
DISTRIBUTION=lognormal
MEAN_RADIUS_MM=0.8
RADIUS_STD_MM=0.25

# --- Physics ---
DRAG_MODEL=clift_gauvin   # clift_gauvin | constant (fixed Cd; legacy)

# --- Geometry / integration ---
CONE=15.0
HEIGHT=2.0
SPEED_SPREAD=0.15
DT=0.001
SEED=42

# --- Output ---
OUT=output/big_drops.png
NO_PLOT=false
DATA=output/big_drops.npz
NO_DATA=false

DROPLETS=
