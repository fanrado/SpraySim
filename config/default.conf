# SpraySim configuration — sourced by main.sh
#
# Every value maps to a run.py argument. Edit here instead of typing flags.
# Lines are plain shell assignments: KEY=value (no spaces around '=').
#
# The droplet COUNT and EXIT SPEED are not set directly — they are derived from
# the pressure, orifice size and nozzle shape below.

# --- Hydraulics (drive exit speed, flow rate and droplet count) ---
PRESSURE_BAR=3.0     # nozzle pressure (bar)
ORIFICE_MM=0.8       # orifice diameter (mm)
NOZZLE_SHAPE=full_cone   # sharp_orifice | rounded_orifice | full_cone | hollow_cone | flat_fan
SPRAY_DURATION=0.15  # seconds the nozzle is open (scales droplet count)

# --- Droplet size distribution ---
DISTRIBUTION=lognormal   # normal | lognormal
MEAN_RADIUS_MM=0.4       # mean droplet radius (mm)
RADIUS_STD_MM=0.12       # std of droplet radius (mm)

# --- Geometry / integration ---
CONE=25.0            # cone half-angle (degrees)
HEIGHT=1.5           # nozzle height above ground (m)
SPEED_SPREAD=0.15    # relative std of droplet speed about the exit speed
DT=0.001             # integration timestep (s)
SEED=42              # RNG seed (for reproducible runs)

# --- Output ---
OUT=output/spray_summary.png   # output figure path
NO_PLOT=false                  # true = print stats only, skip the figure
DATA=output/spray_data.npz     # output .npz data path (result arrays + config)
NO_DATA=false                  # true = skip saving the .npz data

# Optional: pin an explicit droplet count and skip the derivation. Leave empty
# to derive from the hydraulics above.
DROPLETS=
