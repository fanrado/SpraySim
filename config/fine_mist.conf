# Fine mist: low pressure, small orifice, hollow-cone atomiser with a wide cone.
# Small Gaussian-distributed droplets that stay close to the spray axis.

# --- Material (sprayed liquid) ---
MATERIAL=ethanol     # lighter than water -> faster exit, less momentum
DENSITY=

# --- Hydraulics ---
PRESSURE_BAR=2.0
ORIFICE_MM=0.4
NOZZLE_SHAPE=hollow_cone
SPRAY_DURATION=0.3

# --- Droplet size distribution ---
DISTRIBUTION=normal
MEAN_RADIUS_MM=0.15
RADIUS_STD_MM=0.05

# --- Geometry / integration ---
CONE=40.0
HEIGHT=1.5
SPEED_SPREAD=0.15
DT=0.001
SEED=42

# --- Output ---
OUT=output/fine_mist.png
NO_PLOT=false
DATA=output/fine_mist.npz
NO_DATA=false

DROPLETS=
