# Raster path spray: move the nozzle along a serpentine G-code toolpath and
# build a uniform coating (rather than a single-spot deposit).

# --- Material (sprayed liquid) ---
MATERIAL=water
DENSITY=
VISCOSITY=
SOLIDS_FRACTION=0.1  # 10% solids solution -> thin dry film

# --- Path (G-code toolpath) ---
GCODE=examples/raster.gcode  # G1 = spray, G0 = travel; coordinates in mm
FEED=                        # optional feed override (mm/min); empty = program F
STANDOFF_MM=150             # nozzle height above the surface (mm)

# --- Hydraulics (drive exit speed, flow rate and droplet count) ---
PRESSURE_BAR=3.0
ORIFICE_MM=0.8
NOZZLE_SHAPE=full_cone
SPRAY_DURATION=0.15  # ignored when GCODE is set (count comes from path time)

# --- Droplet size distribution ---
DISTRIBUTION=lognormal
MEAN_RADIUS_MM=0.3
RADIUS_STD_MM=0.1

# --- Physics ---
DRAG_MODEL=clift_gauvin

# --- Geometry / integration ---
CONE=25.0
HEIGHT=1.5           # ignored for path runs (standoff sets the height)
SPEED_SPREAD=0.15
DT=0.001
SEED=42

# --- Output ---
OUT=output/raster.png
NO_PLOT=false
DATA=output/raster.npz
NO_DATA=false

DROPLETS=
